name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            features: coreml
            asset_suffix: aarch64-apple-darwin
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            asset_suffix: x86_64-unknown-linux-gnu
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            asset_suffix: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '29.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.asset_suffix }}

      - name: Build release
        shell: bash
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo build --release --locked --target ${{ matrix.target }} --features "$FEATURES"
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package tarball
        id: package
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG#v}"
          ASSET="nihostt-${VERSION}-${SUFFIX}.tar.gz"

          STAGE="$(mktemp -d)"

          BINARY="target/${TARGET}/release/nihostt"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "${BINARY}.exe" "$STAGE/nihostt.exe"
          else
            cp "$BINARY" "$STAGE/nihostt"
          fi
          cp LICENSE README.md CHANGELOG.md "$STAGE/" 2>/dev/null || true

          tar -C "$STAGE" -czf "$ASSET" .
          sha256sum "$ASSET" > "${ASSET}.sha256" 2>/dev/null || shasum -a 256 "$ASSET" > "${ASSET}.sha256"

          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "sha_file=${ASSET}.sha256" >> "$GITHUB_OUTPUT"
          ls -la "$ASSET" "${ASSET}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: nihostt-${{ matrix.asset_suffix }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.sha_file }}
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (CPU)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ekhodzitsky/nihostt
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CUDA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cuda
          push: true
          tags: |
            ghcr.io/ekhodzitsky/nihostt:${{ steps.tag.outputs.tag }}-cuda
            ghcr.io/ekhodzitsky/nihostt:cuda-latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish GitHub release
    needs: [build, docker]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      HAS_MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: nihostt-*
          merge-multiple: true

      - name: Aggregate SHA256SUMS.txt
        shell: bash
        working-directory: dist
        run: |
          : > SHA256SUMS.txt
          for f in *.tar.gz; do
            (sha256sum "$f" 2>/dev/null || shasum -a 256 "$f") >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Install Rust toolchain for SBOM generation
        uses: dtolnay/rust-toolchain@stable

      - name: Generate CycloneDX SBOM
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cargo install --locked --version 0.5.5 cargo-cyclonedx
          VERSION="${TAG#v}"
          cargo cyclonedx --format json --spec-version 1.5
          mkdir -p dist
          cp nihostt.cdx.json "dist/nihostt-${VERSION}.cdx.json"
          ls -la "dist/nihostt-${VERSION}.cdx.json"

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
            dist/*.cdx.json

      - name: Sign tarballs + SHA256SUMS with minisign
        if: env.HAS_MINISIGN_KEY == 'true'
        id: minisign
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        working-directory: dist
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          chmod 600 minisign.key
          for f in *.tar.gz SHA256SUMS.txt *.cdx.json; do
            [ -f "$f" ] || continue
            printf '%s\n' "$MINISIGN_PASSWORD" | \
              minisign -Sm "$f" -s minisign.key \
                -c "nihostt release $(basename "$f")" \
                -t "nihostt $(basename "$f") ${{ steps.tag.outputs.tag }}"
          done
          shred -u minisign.key 2>/dev/null || rm -f minisign.key
          ls -la ./*.minisig
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Warn on missing minisign secret
        if: env.HAS_MINISIGN_KEY != 'true'
        shell: bash
        run: |
          echo "::warning ::MINISIGN_SECRET_KEY not configured — release artefacts will not carry minisign signatures."

      - name: Create / update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS.txt
            dist/*.cdx.json

  crates-io:
    name: Publish to crates.io
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
            exit 0
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"

  homebrew:
    name: Update Homebrew Formula
    needs: [publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Fetch SHA256SUMS
        id: shas
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          gh release download "$TAG" --pattern 'SHA256SUMS.txt' --dir . --clobber
          MAC_ARM=$(awk -v a="nihostt-${VERSION}-aarch64-apple-darwin.tar.gz"    '$2==a{print $1}' SHA256SUMS.txt)
          LIN_X86=$(awk -v a="nihostt-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" '$2==a{print $1}' SHA256SUMS.txt)
          if [ -z "$MAC_ARM" ] || [ -z "$LIN_X86" ]; then
            echo "::error ::SHA256SUMS.txt is missing one of the expected assets" >&2
            cat SHA256SUMS.txt >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mac_arm=$MAC_ARM" >> "$GITHUB_OUTPUT"
          echo "linux_x86=$LIN_X86" >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula/nihostt.rb
        shell: bash
        env:
          VERSION: ${{ steps.shas.outputs.version }}
          MAC_ARM: ${{ steps.shas.outputs.mac_arm }}
          LINUX_X86: ${{ steps.shas.outputs.linux_x86 }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib
          version = os.environ['VERSION']
          mac = os.environ['MAC_ARM']
          lin = os.environ['LINUX_X86']
          p = pathlib.Path('Formula/nihostt.rb')
          text = p.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)
          text = re.sub(
              r'(aarch64-apple-darwin\.tar\.gz"\s+sha256 ")[0-9a-f]{64}(")',
              lambda m: m.group(1) + mac + m.group(2),
              text, count=1, flags=re.S,
          )
          text = re.sub(
              r'(x86_64-unknown-linux-gnu\.tar\.gz"\s+sha256 ")[0-9a-f]{64}(")',
              lambda m: m.group(1) + lin + m.group(2),
              text, count=1, flags=re.S,
          )
          text = re.sub(
              r'releases/download/v[0-9][0-9a-zA-Z.\-+]+/nihostt-[0-9][0-9a-zA-Z.\-+]*-aarch64-apple-darwin\.tar\.gz',
              f'releases/download/v{version}/nihostt-{version}-aarch64-apple-darwin.tar.gz',
              text, count=1,
          )
          text = re.sub(
              r'releases/download/v[0-9][0-9a-zA-Z.\-+]+/nihostt-[0-9][0-9a-zA-Z.\-+]*-x86_64-unknown-linux-gnu\.tar\.gz',
              f'releases/download/v{version}/nihostt-{version}-x86_64-unknown-linux-gnu.tar.gz',
              text, count=1,
          )
          p.write_text(text)
          PY
          head -n 40 Formula/nihostt.rb

      - name: Commit + push
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet Formula/nihostt.rb; then
            echo "No Formula changes for $TAG — nothing to commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/nihostt.rb
          git commit -m "chore(brew): pin Formula to $TAG

          Auto-generated by release workflow after the $TAG tarballs were published.
          SHAs copied verbatim from the release's SHA256SUMS.txt asset."
          git push origin main
