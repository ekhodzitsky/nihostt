openapi: 3.0.3
info:
  title: nihostt API
  description: Local Japanese speech-to-text server
  version: 1.0.0
  contact:
    name: nihostt
    url: https://github.com/ekhodzitsky/nihostt
servers:
  - url: http://127.0.0.1:9876
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  model:
                    type: string
                    example: reazonspeech-k2-v2
                  language:
                    type: string
                    example: ja
  /ready:
    get:
      summary: Readiness probe
      operationId: readinessCheck
      responses:
        '200':
          description: Server is ready (inference pool has capacity)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  model:
                    type: string
                    example: reazonspeech-k2-v2
                  language:
                    type: string
                    example: ja
        '503':
          description: Server not ready (inference pool saturated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready
                  reason:
                    type: string
                    example: inference pool saturated
  /v1/models:
    get:
      summary: List available models
      operationId: listModels
      responses:
        '200':
          description: Model information
          content:
            application/json:
              schema:
                type: object
                properties:
                  model:
                    type: string
                    example: reazonspeech-k2-v2
                  language:
                    type: string
                    example: ja
  /v1/transcribe:
    post:
      summary: Transcribe an audio file
      operationId: transcribeFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file (WAV, MP3, M4A, FLAC, OGG)
      responses:
        '200':
          description: Transcription result
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                    example: こんにちは。
                  language:
                    type: string
                    example: ja
                  confidence:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
                    description: Average token confidence (greedy argmax probability). Absent for silent/empty audio.
                    example: 0.92
        '413':
          description: File too large
        '429':
          description: Rate limit exceeded
          headers:
            retry-after:
              schema:
                type: integer
              description: Seconds until the rate limit resets
        '503':
          description: Server overloaded
          headers:
            retry-after:
              schema:
                type: integer
              description: Seconds until the pool may have capacity
  /v1/transcribe/stream:
    post:
      summary: Stream transcription via SSE
      operationId: transcribeStream
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
  /v1/ws:
    get:
      summary: WebSocket streaming endpoint
      description: |
        Connect via WebSocket for real-time streaming transcription.
        
        Protocol:
        1. Client connects → Server sends `{"type":"ready",...}`
        2. Client sends `{"type":"configure","sample_rate":16000}`
        3. Client sends binary PCM16 frames
        4. Server sends `{"type":"partial","text":"..."}` every 2s of speech
        5. Server sends `{"type":"final","text":"..."}` on silence / stop
        6. Client sends `{"type":"stop"}` to force finalization
      operationId: websocketStream
      responses:
        '101':
          description: WebSocket upgrade successful
components:
  schemas:
    ServerMessage:
      type: object
      properties:
        type:
          type: string
          enum: [ready, partial, final, error]
        text:
          type: string
        speaker_id:
          type: integer
          description: Present only when diarization feature is enabled
    ClientMessage:
      type: object
      properties:
        type:
          type: string
          enum: [configure, stop]
        sample_rate:
          type: integer
