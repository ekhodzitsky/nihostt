# Android linker configuration for cargo-ndk
# Adjust the API level (35) to match your installed NDK and app's minSdkVersion.
# Install NDK via Android Studio SDK Manager, then set NDK_HOME.
#
# Example:
#   export NDK_HOME=$HOME/Library/Android/sdk/ndk/27.0.12077973
#
# [target.aarch64-linux-android]
# linker = "aarch64-linux-android35-clang"
#
# [target.armv7-linux-androideabi]
# linker = "armv7a-linux-androideabi35-clang"
#
# [target.x86_64-linux-android]
# linker = "x86_64-linux-android35-clang"
