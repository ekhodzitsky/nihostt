apiVersion: apps/v1
kind: Deployment
metadata:
  name: nihostt
  labels:
    app: nihostt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nihostt
  template:
    metadata:
      labels:
        app: nihostt
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nihostt
          image: ghcr.io/ekhodzitsky/nihostt:latest
          ports:
            - containerPort: 9876
              name: http
          env:
            - name: RUST_LOG
              value: "nihostt=info"
            - name: NIHOSTT_METRICS
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: model-cache
              mountPath: /home/nihostt/.nihostt/models
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: model-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      initContainers:
        - name: model-download
          image: ghcr.io/ekhodzitsky/nihostt:latest
          command: ["nihostt", "download"]
          volumeMounts:
            - name: model-cache
              mountPath: /home/nihostt/.nihostt/models
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
